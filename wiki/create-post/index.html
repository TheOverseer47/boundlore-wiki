<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Create Post - BoundLore</title>
<link rel="icon" type="image/jpeg" href="/public/images/icon.jpg" />
<link rel="stylesheet" href="/css/style.css" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<nav class="navbar" id="navbar"></nav>

<div class="wiki-hero">
  <h1>Create a Post</h1>
  <p>Choose whether you are writing a Guide or reporting a Discovery.</p>
</div>

<div class="form-box" style="max-width:700px;margin:0 auto;">

  <div class="post-type-toggle">
    <button type="button" id="btnTypeGuide" class="type-btn active">Guide</button>
    <button type="button" id="btnTypeDiscovery" class="type-btn">Discovery</button>
  </div>

  <form id="createPostForm">

    <label for="postTitle">Title</label>
    <input type="text" id="postTitle" required maxlength="120" />

    <div id="guideFields">
      <label for="guideSubcategory">Guide Category</label>
      <select id="guideSubcategory" required>
        <option value="">Select a guide type...</option>
        <option value="survival">Survival</option>
        <option value="exploration">Exploration</option>
        <option value="combat">Combat</option>
        <option value="building">Building</option>
        <option value="taming">Taming</option>
        <option value="farming">Farming</option>
        <option value="crafting-guide">Crafting</option>
        <option value="lore-story">Lore &amp; Story</option>
        <option value="multiplayer-guilds">Multiplayer &amp; Guilds</option>
        <option value="beginner">Beginner Tips</option>
        <option value="advanced">Advanced Strategies</option>
      </select>
    </div>

    <div id="discoveryFields" style="display:none;">
      <label for="discoveryCategory">Which category does this discovery belong to?</label>
      <select id="discoveryCategory">
        <option value="">Select a category...</option>
        <option value="creatures">Creatures</option>
        <option value="biomes">Biomes</option>
        <option value="items">Items</option>
        <option value="building">Building</option>
        <option value="dungeons">Dungeons</option>
        <option value="locations">Locations</option>
        <option value="lore">Lore</option>
        <option value="crafting">Crafting</option>
      </select>
      <p class="field-hint">Your discovery will appear in this category with a "Community Discovery" badge, pending admin review.</p>
    </div>

    <label for="postContent">Content</label>
    <div id="postEditor" style="height:250px;background:#111;border:1px solid #333;"></div>

    <label for="postMedia" style="margin-top:16px;">Attach images (optional)</label>
    <input type="file" id="postMedia" accept="image/*" multiple />

    <p id="formError" class="form-error" style="display:none;color:#ff6b6b;"></p>

    <button type="submit" class="btn-contribute" style="margin-top:20px;">Submit for Review</button>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.js"></script>
<link href="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.snow.css" rel="stylesheet" />

<script src="/js/supabase-config.js"></script>
<script src="/js/auth-nav.js"></script>
<script src="/js/create-post.js"></script>
</body>
</html>
