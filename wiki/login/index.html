<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="Log in to your BoundLore account." />
<title>Login - BoundLore</title>
<link rel="icon" type="image/jpeg" href="/public/images/icon.jpg" />
<link rel="stylesheet" href="../../css/style.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<nav class="navbar" id="navbar">
  <div class="nav-container">
    <a href="/" class="nav-logo">
      <img src="/public/images/icon.jpg" alt="BoundLore" class="nav-icon" />
      <span class="logo-text">Bound<span class="accent">Lore</span></span>
    </a>
    <ul class="nav-links" id="navLinks">
      <li><a href="/">Home</a></li>
      <li><a href="../creatures/">Creatures</a></li>
      <li><a href="../biomes/">Biomes</a></li>
      <li><a href="../items/">Items</a></li>
      <li><a href="../guides/">Guides</a></li>
      <li><a href="../guilds/">Guilds</a></li>
      <li><a href="../community/">Community</a></li>
      <li><a href="../news/">News</a></li>
    <li><a href="/wiki/support">Support</a></li></ul>
    <div class="nav-right">
      <span id="authArea"></span>
      <a href="../register/" class="btn-contribute">Register</a>
      <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
    </div>
  </div>
</nav>

<div class="wiki-hero">
  <p class="breadcrumb"><a href="/">Home</a> &rsaquo; Login</p>
  <h1>Login</h1>
  <p>Access your BoundLore account</p>
</div>

<div class="contribute-layout">
  <div class="form-box">
    <h2>Log in</h2>
    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email *</label>
        <input type="email" id="email" required placeholder="your@email.com" autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="password">Password *</label>
        <input type="password" id="password" required placeholder="Your password" autocomplete="current-password" />
      </div>
      <button type="submit" class="form-submit" id="submitBtn">Log In &rarr;</button>
      <p id="formMessage" style="margin-top:14px;font-size:0.85rem;text-align:center;"></p>
    </form>
    <p style="text-align:center;margin-top:16px;">
      <a href="../reset-password/" style="font-size:0.85rem;">Forgot your password?</a>
    </p>
    <p style="text-align:center;margin-top:10px;color:var(--text-muted);font-size:0.9rem;">
      Don't have an account? <a href="../register/">Register here</a>
    </p>
  </div>
</div>

<footer class="footer"><div class="footer-bottom"><p>&copy; 2026 BoundLore Community &middot; <a href="../imprint/">Imprint</a> &middot; <a href="../privacy/">Privacy Policy</a></p></div></footer>

<script src="/js/supabase-config.js"></script>
<script src="/js/auth-nav.js"></script><script src="../../js/main.js"></script>
<script>
document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const msg = document.getElementById('formMessage');
  msg.textContent = '';

  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  btn.disabled = true;
  btn.textContent = 'Logging in...';

  const { data, error } = await supabase.auth.signInWithPassword({ email, password });

  if (error) {
    msg.textContent = 'Login failed: ' + error.message;
    msg.style.color = '#e05555';
    btn.disabled = false;
    btn.textContent = 'Log In â†’';
    return;
  }

  const user = data.user;
  if (user) {
    const { data: profile, error: profileError } = await supabase
      .from('profiles')
      .select('is_banned')
      .eq('id', user.id)
      .single();

    if (profileError) {
      msg.textContent = 'Login failed: ' + profileError.message;
      msg.style.color = '#e05555';
      btn.disabled = false;
      btn.textContent = 'Log In â†’';
      return;
    }

    if (profile?.is_banned) {
      await supabase.auth.signOut();
      msg.textContent = 'Dein Account wurde gesperrt. Bitte kontaktiere den Support.';
      msg.style.color = '#e05555';
      btn.disabled = false;
      btn.textContent = 'Log In â†’';
      return;
    }
  }

  msg.textContent = 'Success! Redirecting...';
  msg.style.color = '#50c878';
  setTimeout(function() { window.location.href = '/'; }, 800);
});

(async function checkSession() {
  const { data } = await supabase.auth.getSession();
  if (data.session) {
    window.location.href = '/';
  }
})();
</script>
</body>
</html>
