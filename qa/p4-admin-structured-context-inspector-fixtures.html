<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex,nofollow" />
<title>QA-only P4 Admin Structured Context Inspector Fixtures - BoundLore</title>
<link rel="stylesheet" href="/css/style.css" />
<style>
  .qa-fixture-page {
    max-width: 960px;
    margin: 0 auto;
    padding: 24px 16px 48px;
  }
  .qa-fixture-banner {
    background: #1a2332;
    border: 1px solid #3d5166;
    border-radius: 8px;
    padding: 16px 20px;
    margin-bottom: 24px;
  }
  .qa-fixture-banner h1 {
    margin: 0 0 8px;
    font-size: 1.35rem;
  }
  .qa-fixture-banner p {
    margin: 4px 0;
    color: #b8c5d4;
    font-size: 0.95rem;
  }
  .qa-fixture-summary {
    background: #121820;
    border: 1px solid #2a3544;
    border-radius: 6px;
    padding: 12px 16px;
    margin-bottom: 24px;
    font-size: 0.9rem;
  }
  .bl-p4-admin-inspector-fixtures .qa-fixture-panel {
    background: #121820;
    border: 1px solid #2a3544;
    border-radius: 8px;
    padding: 16px 20px;
    margin-bottom: 20px;
  }
  .qa-fixture-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 8px;
  }
  .qa-fixture-header h2 {
    margin: 0;
    font-size: 1.05rem;
  }
  .qa-fixture-badge {
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    padding: 4px 8px;
    border-radius: 4px;
  }
  .qa-fixture-badge--pass {
    background: #1e3a2f;
    color: #7dcea0;
  }
  .qa-fixture-badge--fail {
    background: #3a1e1e;
    color: #e88;
  }
  .qa-fixture-meta {
    margin: 4px 0;
    font-size: 0.88rem;
    color: #9fb0c3;
  }
  .bl-p4-inspector-panel {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid #2a3544;
  }
  .bl-p4-inspector-section {
    margin-bottom: 12px;
  }
  .bl-p4-inspector-heading {
    margin: 0 0 6px;
    font-size: 0.95rem;
  }
  .bl-p4-inspector-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.82rem;
  }
  .bl-p4-inspector-table th,
  .bl-p4-inspector-table td {
    border: 1px solid #2a3544;
    padding: 4px 8px;
    text-align: left;
    vertical-align: top;
  }
  .bl-p4-inspector-pre {
    font-size: 0.75rem;
    overflow-x: auto;
    background: #0d1117;
    padding: 8px;
    border-radius: 4px;
    margin: 0;
  }
  .bl-p4-inspector-empty {
    color: #8a97a8;
    font-style: italic;
  }
  .bl-p4-inspector-meta {
    font-size: 0.85rem;
    color: #9fb0c3;
    margin: 0 0 10px;
  }
</style>
</head>
<body>
<div class="qa-fixture-page">
  <header class="qa-fixture-banner">
    <h1>QA-only local fixture — P4-C.3 Admin Structured Context Inspector</h1>
    <p><strong>Not linked from wiki navigation.</strong> Synthetic entry objects only. No Supabase. No posts. No data writes. No privileged authoring flows.</p>
    <p>P4-C.3 read-only structured field inspector baseline fixture harness.</p>
  </header>

  <div id="fixtureSummary" class="qa-fixture-summary">Loading fixtures…</div>
  <div id="fixtureRoot" class="bl-p4-admin-inspector-fixtures"></div>
</div>

<script src="/js/resource-node-registry.js?v=1"></script>
<script src="/js/observation-context-registry.js?v=1"></script>
<script src="/js/creature-encounter-registry.js?v=1"></script>
<script src="/js/requirement-unlock-registry.js?v=1"></script>
<script src="/js/versioning-model.js?v=3"></script>
<script src="/js/quest-event-registry.js?v=1"></script>
<script src="/js/economy-registry.js?v=1"></script>
<script src="/js/content-model-registry.js?v=5"></script>
<script src="/js/context-data-contract.js?v=1"></script>
<script src="/js/structured-context-schema.js?v=1"></script>
<script src="/js/admin-structured-context-inspector.js?v=1"></script>
<script src="/qa/p4-admin-structured-context-inspector-fixtures.js?v=1"></script>
</body>
</html>
